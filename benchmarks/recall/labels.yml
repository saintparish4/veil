# ---------------------------------------------------------------------------
# Intentional smoke-test label (DO NOT REMOVE).
#
# References a file that deliberately does not exist on disk. Kept in-tree so
# every `cargo xtask recall` run continuously proves that the runner:
#   1. emits a "labeled file not found on disk" warning on stderr,
#   2. counts unmatched labels as misses,
#   3. surfaces them in misses.md and drops `recall_pct` in summary.json.
#
# Current effect on the 9-label SWC corpus:
#   - summary.md : labeled sites 9, caught 8, missed 1, recall 88.89%.
#   - misses.md  : this exact row is listed.
#   - stderr     : one "labeled file not found on disk" line.
# ---------------------------------------------------------------------------
- file: recall/swc/does-not-exist/fake_file.sol
  detector_id: reentrancy
  line: 42
  swc_id: SWC-107
  notes: Intentional miss -- proves missing-file warning + miss accounting.